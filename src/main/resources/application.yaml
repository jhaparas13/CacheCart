server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cachecart
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: CacheCart

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  redis:
    host: localhost
    port: 6379

  cache:
    type: redis