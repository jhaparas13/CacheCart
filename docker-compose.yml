#version: '3.8'

services:

  redis:
    image: redis:7
    container_name: cachecart-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: cachecart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cachecart
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      retries: 10

  app:
    build: .
    container_name: cachecart-app
    ports:
      - "8080:8080"
    depends_on:
      mysql:
          condition: service_healthy
      redis:
        condition: service_healthy